<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>docker-compose.yml</title>
    <style>
        .code-container {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            position: relative;
            margin: 20px 0;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: #007acc;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }
        .copy-btn:hover {
            background-color: #005a9e;
        }
        pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
<div class="code-container">
    <button class="copy-btn" onclick="copyCode()">Копия кардан</button>
    <pre id="codeBlock">
# docker/docker-compose.yml - Барои коркарди маҳаллӣ ва истеҳсолӣ

version: '3.8'

services:
  # PostgreSQL базаи додаҳо
  postgres:
    image: postgres:15-alpine
    container_name: tojrason_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: tojrason
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tojrason_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis барои кэш ва навбат
  redis:
    image: redis:7-alpine
    container_name: tojrason_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tojrason_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tojrason_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/tojrason
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      JWT_EXPIRES_IN: 7d
      LOG_LEVEL: info
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tojrason_network
    volumes:
      - ../backend/logs:/app/logs

  # Nginx (барои frontend ва reverse proxy)
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: tojrason_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - tojrason_network
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../frontend/admin/dist:/usr/share/nginx/html/admin:ro
      - ../frontend/client/dist:/usr/share/nginx/html/client:ro
      - ../frontend/courier/dist:/usr/share/nginx/html/courier:ro

volumes:
  postgres_data:
  redis_data:

networks:
  tojrason_network:
    driver: bridge
    </pre>
</div>
<script>
function copyCode() {
    const code = document.getElementById('codeBlock').innerText;
    navigator.clipboard.writeText(code).then(() => {
        alert('Код копия карда шуд!');
    }).catch(() => {
        alert('Хатогӣ ҳангоми копия кардан');
    });
}
</script>
</body>
</html>
